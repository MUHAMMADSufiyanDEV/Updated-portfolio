<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MUHAMMAD Sufiyan | Full-Stack & SEO Specialist</title>
    <link rel="icon" type="image/x-icon" href="assets/187929395.png">
    <!-- CDN dependencies preserved for simplicity -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Keep original fonts and root CSS inlined so the visual look remains identical -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono&display=swap');

      :root {
        --accent: #3b82f6;
        --accent-glow: rgba(59, 130, 246, 0.5);
      }

      html, body, #root { height: 100%; }

      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: #030712;
        color: #f8fafc;
        overflow-x: hidden;
        margin: 0;
      }

      .mono { font-family: 'JetBrains Mono', monospace; }

      #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
      }

      .glass {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .glass-card {
        background: rgba(30, 41, 59, 0.4);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .glass-card:hover {
        border-color: var(--accent);
        box-shadow: 0 0 25px var(--accent-glow);
        transform: translateY(-8px) scale(1.02);
      }

      .nav-link.active {
        color: var(--accent);
      }
      .nav-link.active::after {
        content: '';
        display: block;
        width: 6px;
        height: 6px;
        background: var(--accent);
        border-radius: 50%;
        margin: 4px auto 0;
        box-shadow: 0 0 10px var(--accent);
      }

      section { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
      section.visible { opacity: 1; transform: translateY(0); }

      .custom-gradient {
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>
  <body>
    <!-- React will mount inside #root -->
    <div id="root"></div>

    <!-- Vite entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
